name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"  # Кэшируем node_modules

      - name: Install dependencies
        run: npm ci  # Устанавливаем пакеты через ci (быстрее и надёжнее)

      - name: Run Linting
        run: npm run lint  # Запускаем ESLint

      - name: Run Tests
        run: npm test -- --watchAll=false  # Запускаем тесты

      - name: Build App
        run: npm run build  # Проверяем, что проект билдится

  deploy:
    name: Deploy to Vercel
    needs: test  # Выполняется только если тесты пройдены
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Deploy to Vercel
        run: npm run deploy
